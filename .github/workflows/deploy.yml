# ─────────────────────────────────────────────────────────────────
#  VickYCloud — GitHub Actions CI/CD Pipeline
#  File: .github/workflows/deploy.yml
#
#  Triggers: push to main / pull_request to main
#  Pipeline:
#    1. Lint & validate
#    2. Build Docker images (web + app)
#    3. Push to Docker Hub
#    4. Terraform plan / apply
#    5. kubectl rollout to Minikube (self-hosted runner)
#    6. Smoke test
# ─────────────────────────────────────────────────────────────────

name: VickYCloud — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USER:     ${{ secrets.DOCKER_USERNAME }}
  WEB_IMAGE:       ${{ secrets.DOCKER_USERNAME }}/web-tier
  APP_IMAGE:       ${{ secrets.DOCKER_USERNAME }}/app-tier
  IMAGE_TAG:       ${{ github.sha }}
  TF_DIR:          ./terraform
  K8S_NAMESPACE:   vickycloud

jobs:
# ══════════════════════════════════════════════════════════════════
#  JOB 1 — LINT & VALIDATE
# ══════════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: web-tier/Dockerfile
          failure-threshold: error

      - name: Lint Dockerfiles — app tier
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app-tier/Dockerfile
          failure-threshold: error

      - name: Validate Kubernetes manifests (kubeval)
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz \
            | tar xz && sudo mv kubeval /usr/local/bin/
          kubeval k8s/*.yml --ignore-missing-schemas

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform fmt check
        run: terraform -chdir=${{ env.TF_DIR }} fmt -check -recursive

      - name: Terraform validate
        run: |
          terraform -chdir=${{ env.TF_DIR }} init -backend=false
          terraform -chdir=${{ env.TF_DIR }} validate

# ══════════════════════════════════════════════════════════════════
#  JOB 2 — BUILD & PUSH DOCKER IMAGES
# ══════════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Web Tier ────────────────────────────────────────────
      - name: Build & Push web-tier
        uses: docker/build-push-action@v5
        with:
          context:   ./web-tier
          file:      ./web-tier/Dockerfile
          push:      true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.WEB_IMAGE }}:buildcache,mode=max

      # ── App Tier ────────────────────────────────────────────
      - name: Build & Push app-tier
        uses: docker/build-push-action@v5
        with:
          context:   ./app-tier
          file:      ./app-tier/Dockerfile
          push:      true
          tags: |
            ${{ env.APP_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.APP_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.APP_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.APP_IMAGE }}:buildcache,mode=max

      - name: Save image tags as artifact
        run: |
          echo "WEB_IMAGE=${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}" >> image_tags.env
          echo "APP_IMAGE=${{ env.APP_IMAGE }}:${{ env.IMAGE_TAG }}" >> image_tags.env

      - uses: actions/upload-artifact@v4
        with:
          name: image-tags
          path: image_tags.env

# ══════════════════════════════════════════════════════════════════
#  JOB 3 — TERRAFORM PLAN (PR only)
# ══════════════════════════════════════════════════════════════════
  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: self-hosted          # needs minikube + kubectl + terraform
    needs: lint
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_DIR }} init
        env:
          TF_VAR_mysql_password: ${{ secrets.MYSQL_PASSWORD }}
          TF_VAR_grafana_password: ${{ secrets.GRAFANA_PASSWORD }}

      - name: Terraform Plan
        run: |
          terraform -chdir=${{ env.TF_DIR }} plan \
            -var="mysql_password=${{ secrets.MYSQL_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -out=tfplan
        env:
          TF_VAR_mysql_password: ${{ secrets.MYSQL_PASSWORD }}
          TF_VAR_grafana_password: ${{ secrets.GRAFANA_PASSWORD }}

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan

# ══════════════════════════════════════════════════════════════════
#  JOB 4 — TERRAFORM APPLY + DEPLOY (main only, self-hosted runner)
# ══════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Terraform Apply & Deploy
    runs-on: self-hosted          # your machine with minikube running
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: http://localhost:30080

    steps:
      - uses: actions/checkout@v4

      - name: Download image tags
        uses: actions/download-artifact@v4
        with:
          name: image-tags

      - name: Load image tags
        run: cat image_tags.env >> $GITHUB_ENV

      # ── Point Docker CLI at Minikube's daemon ────────────────
      - name: Load images into Minikube
        run: |
          eval $(minikube docker-env)
          docker pull ${{ env.WEB_IMAGE }}
          docker pull ${{ env.APP_IMAGE }}

      # ── Terraform Apply ──────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_DIR }} init

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply -auto-approve \
            -var="mysql_password=${{ secrets.MYSQL_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="web_image=${{ env.WEB_IMAGE }}" \
            -var="app_image=${{ env.APP_IMAGE }}"

      # ── Rolling update with new image SHA ────────────────────
      - name: Update image tags in cluster
        run: |
          kubectl set image deployment/web-deployment \
            web=${{ env.WEB_IMAGE }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl set image deployment/app-deployment \
            app=${{ env.APP_IMAGE }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/web-deployment -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/app-deployment -n ${{ env.K8S_NAMESPACE }} --timeout=120s

# ══════════════════════════════════════════════════════════════════
#  JOB 5 — SMOKE TEST
# ══════════════════════════════════════════════════════════════════
  smoke-test:
    name: ✅ Smoke Test
    runs-on: self-hosted
    needs: deploy

    steps:
      - name: Get Minikube IP
        run: echo "MINIKUBE_IP=$(minikube ip)" >> $GITHUB_ENV

      - name: Test web tier health
        run: |
          curl -sf http://${{ env.MINIKUBE_IP }}:30080 \
            || (echo "❌ Web tier unreachable" && exit 1)
          echo "✅ Web tier OK"

      - name: Test login page
        run: |
          curl -sf http://${{ env.MINIKUBE_IP }}:30080/login.html \
            || (echo "❌ Login page unreachable" && exit 1)
          echo "✅ Login page OK"

      - name: Test PHP app tier via nginx proxy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://${{ env.MINIKUBE_IP }}:30080/submit.php)
          echo "submit.php response: $STATUS"
          # 400 = reached PHP (invalid input) = app tier alive
          [[ "$STATUS" == "200" || "$STATUS" == "400" ]] \
            && echo "✅ App tier OK" || (echo "❌ App tier unreachable" && exit 1)

      - name: Notify success
        run: |
          echo "🎉 Deployment successful!"
          echo "🌐 App:      http://$(minikube ip):30080"
          echo "📊 Grafana:  http://$(minikube ip):32000"
          echo "🔥 Prometheus: http://$(minikube ip):32001"
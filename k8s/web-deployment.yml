# ─────────────────────────────────────────────────────────────────
#  VickYCloud — Web Tier
#  File: web-deployment.yml
#  Runs: nginx:alpine (index.html + login.html + proxy to app)
# ─────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: default
  labels:
    app: web
    tier: presentation
    project: vickycloud
spec:
  replicas: 2                          # 2 pods for HA
  selector:
    matchLabels:
      app: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0                # zero-downtime deploys
  template:
    metadata:
      labels:
        app: web
        tier: presentation
    spec:
      containers:
        - name: web
          image: vickycloud/web-tier:latest   # replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http

          # ── Resource limits ───────────────────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # ── Liveness probe ────────────────────────────────
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          # ── Readiness probe ───────────────────────────────
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

      restartPolicy: Always
# ─────────────────────────────────────────────────────────────────
#  VickYCloud — Nginx Web Tier Config
#  Proxies PHP requests → app-service (Kubernetes service name)
#  Serves static HTML directly from nginx
# ─────────────────────────────────────────────────────────────────

upstream app_backend {
    server app-service:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html login.html;

    # ── Security headers ───────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin"         always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # ── Gzip compression ───────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/javascript
                      application/javascript application/json
                      text/html;

    # ── Static files — served directly by nginx ───────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── login.html ─────────────────────────────────────────────
    location = /login.html {
        root /usr/share/nginx/html;
        expires 1h;
    }

    # ── PHP routes — proxy to app-service (Apache + PHP) ──────
    location ~ \.php$ {
        proxy_pass         http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # Buffer settings
        proxy_buffering        on;
        proxy_buffer_size      4k;
        proxy_buffers          8 4k;
    }

    # ── Named PHP routes (explicit, catches non-.php URIs too) ─
    location = /submit.php {
        proxy_pass       http://app_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /login.php {
        proxy_pass       http://app_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /register.php {
        proxy_pass       http://app_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /dashboard.php {
        proxy_pass       http://app_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /logout.php {
        proxy_pass       http://app_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Custom error pages ─────────────────────────────────────
    error_page 404              /index.html;
    error_page 500 502 503 504  /index.html;

    # ── Access logs ────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;
}
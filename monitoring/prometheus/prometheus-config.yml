# ─────────────────────────────────────────────────────────────────
#  VickYCloud — Prometheus ConfigMap
#  File: monitoring/prometheus/prometheus-config.yml
#  Scrapes: web-tier, app-tier, MySQL, Kubernetes nodes
# ─────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    project: vickycloud
    component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      external_labels:
        project: 'vickycloud'
        env:     'local'

    # ── Alerting rules file ────────────────────────────────────
    rule_files:
      - "/etc/prometheus/rules/*.yml"

    # ── Alertmanager ───────────────────────────────────────────
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    # ── Scrape configs ─────────────────────────────────────────
    scrape_configs:

      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes API server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace,
                            __meta_kubernetes_service_name,
                            __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # Kubernetes nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # All pods with annotation prometheus.io/scrape: "true"
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__,
                            __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # VickYCloud web-tier (nginx)
      - job_name: 'vickycloud-web'
        static_configs:
          - targets: ['web-service.vickycloud.svc.cluster.local:80']
            labels:
              tier: 'presentation'
              service: 'nginx'

      # VickYCloud app-tier (PHP)
      - job_name: 'vickycloud-app'
        static_configs:
          - targets: ['app-service.vickycloud.svc.cluster.local:80']
            labels:
              tier: 'application'
              service: 'php-apache'

      # MySQL Exporter (mysqld_exporter)
      - job_name: 'vickycloud-mysql'
        static_configs:
          - targets: ['mysql-exporter.vickycloud.svc.cluster.local:9104']
            labels:
              tier: 'data'
              service: 'mysql'

      # Node Exporter
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['monitoring']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: node-exporter

  # ── Alert rules ────────────────────────────────────────────────
  alert-rules.yml: |
    groups:
      - name: vickycloud.rules
        rules:

          # Pod down
          - alert: PodDown
            expr: kube_pod_status_phase{namespace="vickycloud",phase!="Running"} == 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is not running"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been down for 1 minute."

          # High CPU
          - alert: HighCPUUsage
            expr: |
              rate(container_cpu_usage_seconds_total{namespace="vickycloud"}[5m]) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.pod }}"
              description: "Container {{ $labels.container }} is using > 80% CPU."

          # High Memory
          - alert: HighMemoryUsage
            expr: |
              container_memory_usage_bytes{namespace="vickycloud"}
              / container_spec_memory_limit_bytes{namespace="vickycloud"} * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory on {{ $labels.pod }}"
              description: "Container {{ $labels.container }} memory > 85% of limit."

          # MySQL down
          - alert: MySQLDown
            expr: mysql_up == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "MySQL is DOWN"
              description: "MySQL instance in vickycloud namespace is unreachable."

          # Deployment replica mismatch
          - alert: DeploymentReplicasMismatch
            expr: |
              kube_deployment_spec_replicas{namespace="vickycloud"}
              != kube_deployment_status_available_replicas{namespace="vickycloud"}
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.deployment }} has fewer replicas than desired"